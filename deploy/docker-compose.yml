version: '3.8'
name: growthmind-dependencies

services:
  postgres:
    image: postgres:16-alpine
    container_name: growthmind-postgres
    environment:
      POSTGRES_DB: growthmind
      POSTGRES_USER: growthmind
      POSTGRES_PASSWORD: growthmind123
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - growthmind-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U growthmind -d growthmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: growthmind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - growthmind-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    container_name: growthmind-etcd
    environment:
      - ETCD_NAME=etcd0
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_CLUSTER=etcd0=http://etcd:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd_data:/etcd-data
    networks:
      - growthmind-network
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  notifications-rpc:
    build:
      context: ../../services/microservices/notifications/rpc
      dockerfile: Dockerfile
    container_name: growthmind-notifications-rpc
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=growthmind
      - POSTGRES_USER=growthmind
      - POSTGRES_PASSWORD=growthmind123
      - ETCD_ENDPOINTS=etcd:2379
      - ETCD_KEY=notifications.rpc
    ports:
      - "9092:9092"
    depends_on:
      postgres:
        condition: service_healthy
      etcd:
        condition: service_healthy
    networks:
      - growthmind-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  etcd_data:

networks:
  growthmind-network:
    driver: bridge
