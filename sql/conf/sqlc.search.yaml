version: "2"
sql:
  - schema: "../../sql/migrations"
    queries: "../../sql/queries/search"
    engine: "postgresql"
    gen:
      go:
        package: "db"
        out: "../../services/microservices/search/rpc/internal/repository/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_enum_valid_method: true
        emit_all_enum_values: true
        emit_prepared_queries: true
        emit_result_struct_pointers: true
        emit_pointers_for_null_types: true
        query_parameter_limit: 4
        json_tags_case_style: snake
        overrides:
          - column: "articles.search_vector"
            go_type:
              type: "string"
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
            nullable: false
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "NullUUID"
            nullable: true