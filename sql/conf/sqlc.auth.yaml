version: "2"
sql:
  - schema: "../../sql/migrations"
    queries: "../../sql/queries/auth"
    engine: "postgresql"
    gen:
      go:
        package: "db"
        out: "../../services/microservices/auth/rpc/internal/repository/db"
        emit_json_tags: true
        emit_db_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_enum_valid_method: true
        emit_all_enum_values: true
        overrides:
          - column: "articles.search_vector"
            go_type:
              type: "string"
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
            nullable: false
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "NullUUID"
            nullable: true