# Example gateway configuration.
# Copy to services/gateway/growth/etc/growthapi.yaml and customize.
# NEVER commit the real YAML to git (see .gitignore).

Name: growth-gateway
Host: 0.0.0.0
Port: 8888

# Connection / DoS hardening
MaxConns: 10000
MaxBytes: 1048576   # 1 MB
Timeout: 3000      # 3 seconds

# Middleware toggles (go-zero defaults are generally safe)
Middlewares:
  Trace: true
  Log: true
  Prometheus: true
  MaxConns: true
  Breaker: true
  Shedding: true
  Timeout: true
  Recover: true
  Metrics: true
  MaxBytes: true
  Gunzip: true

# Downstream gRPC service endpoints
AuthRpc:
  Endpoints:
    - 127.0.0.1:8081
  NonBlock: true

ClientRpc:
  Endpoints:
    - 127.0.0.1:8082
  NonBlock: true

SearchRpc:
  Endpoints:
    - 127.0.0.1:8083
  NonBlock: true

AICoachRpc:
  Endpoints:
    - 127.0.0.1:8085
  NonBlock: true

NotificationsRpc:
  Endpoints:
    - 127.0.0.1:8086
  NonBlock: true

Auth:
  Secret: 36be8f513d378b3e8560303d509a7a540385bc50b717c3d487c788210703390b
  Issuer: "growth"
  Audience: "growth-api"

ServiceAuth:
  Secret: 64a0e43ea92b735e40366c4696b213c01cdfe8a7905c7d364e7f2723bea166c0

Billing:
  Mode: "stripe_test"           # disabled | fake_door | stripe_test | stripe_live
  StripeSecretKey: sk_test_dev_placeholder
  StripeWebhookSecret: whsec_dev_placeholder
  FrontendURL: "https://growth.app"

# Rate limiting (Redis-backed fixed-window)
RateLimit:
  Redis:
    Host: "127.0.0.1:6379"
    Type: "node"
    Pass: ""
  AuthQuota: "60,5"             # 5 requests per 60 sec per IP (login/register/refresh)
  AIQuota: "60,10"              # 10 AI requests per 60 sec per user
  SearchQuota: "60,30"          # 30 search requests per 60 sec per IP

# Distributed tracing (OTLP / Zipkin / Jaeger)
Telemetry:
  Name: growth-gateway
  Endpoint: http://localhost:14268/api/traces
  Sampler: 1.0
  Batcher: otlpgrpc             # otlpgrpc | otlphttp | zipkin | file
