syntax = "proto3";

package aicoach;

option go_package = "./aicoach";

// Check-in Feedback
message CheckInFeedbackRequest {
  string user_id = 1;
  string habit_id = 2;
  string habit_name = 3;
  string status = 4; // completed | missed
  string mood = 5;
  string energy = 6;
  string blocker = 7;
  string note = 8;
  int32 streak = 9;
  string accountability_style = 10;
  string preferred_tone = 11;
  string difficulty_preference = 12;
  repeated string common_blockers = 13;
  string recent_pattern = 14;
  string goal_title = 15;
}

message CheckInFeedbackResponse {
  string feedback = 1;
}

// Personalized Coaching
message PersonalizedCoachingRequest {
  string user_id = 1;
  string user_message = 2;
  string accountability_style = 3;
  string preferred_tone = 4;
  string difficulty_preference = 5;
  repeated string active_goals = 6;
  repeated string active_habits = 7;
  string recent_check_ins_summary = 8;
  repeated string common_blockers = 9;
  map<string, string> pattern_insights = 10;
  repeated HistoryMessage history = 11;  // prior conversation messages (oldest first)
  string user_full_name = 12;
  string user_bio = 13;
  string user_location = 14;
  repeated string user_interests = 15;
}

// HistoryMessage is a single prior message in a conversation, used to give the
// LLM context from earlier turns.
message HistoryMessage {
  string role = 1;    // "user" | "assistant"
  string content = 2;
}

message PersonalizedCoachingResponse {
  string coaching_response = 1;
}

// Weekly Review
message HabitBreakdown {
  string habit_id = 1;
  string habit_name = 2;
  string category = 3;
  int32 completed_count = 4;
  int32 missed_count = 5;
  float completion_rate = 6;
}

message BlockerStat {
  string blocker = 1;
  int32 count = 2;
}

message MoodStat {
  string mood = 1;
  int32 count = 2;
}

message EnergyStat {
  string energy = 1;
  int32 count = 2;
}

message WeeklyReviewAdjustment {
  string habit_id = 1;
  string habit_name = 2;
  string reason = 3;
  string suggestion = 4;
  string adjustment_type = 5; // reduce_difficulty | change_time | clarify_plan | keep_same | pause_habit
}

message NextWeekPlan {
  string focus = 1;
  repeated string commitments = 2;
  repeated string risks = 3;
  repeated string recovery_actions = 4;
}

message WeeklyReviewRequest {
  string user_id = 1;
  string accountability_style = 2;
  string preferred_tone = 3;
  string difficulty_preference = 4;
  repeated string common_blockers = 5;
  repeated string goals = 6;
  int32 total_habits = 7;
  float completion_rate = 8;
  int32 completed_check_ins = 9;
  int32 missed_check_ins = 10;
  string best_day = 11;
  string hardest_day = 12;
  string top_blocker = 13;
  repeated HabitBreakdown habit_breakdowns = 14;
  repeated BlockerStat blocker_stats = 15;
  repeated MoodStat mood_stats = 16;
  repeated EnergyStat energy_stats = 17;
  repeated string detected_patterns = 18;
}

message WeeklyReviewResponse {
  string ai_summary = 1;
  repeated WeeklyReviewAdjustment suggested_adjustments = 2;
  NextWeekPlan next_week_plan = 3;
}

// Streaming weekly review
message WeeklyReviewStreamChunk {
  string delta = 1;              // text delta (summary text as it's generated)
  bool complete = 2;             // true when the stream is finished
  WeeklyReviewResponse review = 3; // full structured response (only set when complete=true)
  bool finalizing = 4;           // true when text is done, backend is parsing JSON
}

// Streaming personalized coaching
message PersonalizedCoachingStreamChunk {
  string delta = 1;              // text delta (coaching response as it's generated)
  bool complete = 2;             // true when the stream is finished
  string full_response = 3;      // full coaching response (only set when complete=true)
}

// Onboarding Habit Generation
message OnboardingHabitSuggestion {
  string name = 1;
  string description = 2;
}

message GenerateOnboardingHabitsRequest {
  string user_id = 1;
  string goal_title = 2;
  string goal_category = 3;
  string motivation = 4;
  string blocker = 5;
  int32 daily_minutes = 6;
  string accountability_style = 7; // gentle | balanced | strict
}

message GenerateOnboardingHabitsResponse {
  repeated OnboardingHabitSuggestion habits = 1;
}

service AICoachService {
  rpc GenerateCheckInFeedback(CheckInFeedbackRequest) returns (CheckInFeedbackResponse);
  rpc GeneratePersonalizedCoaching(PersonalizedCoachingRequest) returns (PersonalizedCoachingResponse);
  rpc GenerateWeeklyReview(WeeklyReviewRequest) returns (WeeklyReviewResponse);
  rpc StreamWeeklyReview(WeeklyReviewRequest) returns (stream WeeklyReviewStreamChunk);
  rpc StreamPersonalizedCoaching(PersonalizedCoachingRequest) returns (stream PersonalizedCoachingStreamChunk);
  rpc GenerateOnboardingHabits(GenerateOnboardingHabitsRequest) returns (GenerateOnboardingHabitsResponse);
}

// Conversation Service
message Conversation {
  string id = 1;
  string user_id = 2;
  string title = 3;
  string type = 4;       // coach | therapist
  string last_message = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
  bool archived = 8;
}

message ConversationMessage {
  string id = 1;
  string conversation_id = 2;
  string role = 3;        // user | assistant
  string content = 4;
  int64 created_at = 5;
}

message StartConversationRequest {
  string user_id = 1;
  string type = 2;        // coach | therapist
  string title = 3;
  string initial_message = 4;
}

message StartConversationResponse {
  Conversation conversation = 1;
  ConversationMessage initial_message_row = 2; // only set if initial_message was provided
}

message ListConversationsRequest {
  string user_id = 1;
  string type = 2;        // optional filter
  int32 page = 3;
  int32 limit = 4;
}

message ListConversationsResponse {
  repeated Conversation conversations = 1;
  int32 total = 2;
}

message GetConversationRequest {
  string conversation_id = 1;
  string user_id = 2;
}

message GetConversationResponse {
  Conversation conversation = 1;
}

message GetMessagesRequest {
  string conversation_id = 1;
  string user_id = 2;
  int32 page = 3;
  int32 limit = 4;
}

message GetMessagesResponse {
  repeated ConversationMessage messages = 1;
  int32 total = 2;
}

message AppendMessageRequest {
  string conversation_id = 1;
  string user_id = 2;
  string role = 3;        // user | assistant
  string content = 4;
}

message AppendMessageResponse {
  ConversationMessage message = 1;
  Conversation conversation = 2; // updated conversation with new last_message
}

message ArchiveConversationRequest {
  string conversation_id = 1;
  string user_id = 2;
}

message ArchiveConversationResponse {
  Conversation conversation = 1;
}

message DeleteConversationRequest {
  string conversation_id = 1;
  string user_id = 2;
}

message DeleteConversationResponse {}

service ConversationService {
  rpc StartConversation(StartConversationRequest) returns (StartConversationResponse);
  rpc ListConversations(ListConversationsRequest) returns (ListConversationsResponse);
  rpc GetConversation(GetConversationRequest) returns (GetConversationResponse);
  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);
  rpc AppendMessage(AppendMessageRequest) returns (AppendMessageResponse);
  rpc ArchiveConversation(ArchiveConversationRequest) returns (ArchiveConversationResponse);
  rpc UnarchiveConversation(ArchiveConversationRequest) returns (ArchiveConversationResponse);
  rpc DeleteConversation(DeleteConversationRequest) returns (DeleteConversationResponse);
}
